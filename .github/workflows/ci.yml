name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Security ──────────────────────────────────────────────
  secrets-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Scan for leaked secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Code Quality ──────────────────────────────────────────
  detekt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew detekt

  # ── Crash Prevention ──────────────────────────────────────
  crash-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Run crash-pattern scanner tests
        run: bash scripts/__tests__/run.sh
      - name: Crash-pattern check (introduced lines only)
        run: |
          BASE="${{ github.base_ref || 'main' }}"
          git fetch --no-tags origin "$BASE"
          bash scripts/crash-check.sh --diff "origin/$BASE"

  # ── Android ───────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    needs: [detekt, secrets-scan, crash-check]
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6

      - name: Create google-services.json for CI
        run: |
          cat > composeApp/google-services.json << 'GSEOF'
          {
            "project_info": { "project_number": "000000000000", "project_id": "stitchpad-ci", "storage_bucket": "stitchpad-ci.appspot.com" },
            "client": [{ "client_info": { "mobilesdk_app_id": "1:000000000000:android:0000000000000000", "android_client_info": { "package_name": "com.danzucker.stitchpad" } }, "api_key": [{ "current_key": "CI_DUMMY_KEY" }] }],
            "configuration_version": "1"
          }
          GSEOF

      - name: Build Android debug APK
        run: ./gradlew :composeApp:assembleDebug

      - name: Run Android Lint
        run: ./gradlew :composeApp:lintDebug
        continue-on-error: true

      - name: Run tests
        run: ./gradlew :composeApp:allTests

      - name: Generate coverage report
        run: ./gradlew :composeApp:koverXmlReport :composeApp:koverHtmlReport
        if: always()

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: composeApp/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload test reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-reports
          path: composeApp/build/reports/tests/
          retention-days: 14

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: composeApp/build/reports/kover/
          retention-days: 14

      - name: Upload lint report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lint-report
          path: composeApp/build/reports/lint-results-debug.html
          retention-days: 14

      - name: Test results summary
        uses: dorny/test-reporter@v3
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        with:
          name: Unit Tests
          path: composeApp/build/test-results/**/TEST-*.xml
          reporter: java-junit

      - name: Coverage PR comment
        uses: mi-kas/kover-report@v2
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        with:
          path: composeApp/build/reports/kover/report.xml
          title: Code Coverage
          update-comment: true
          min-coverage-overall: 0
          min-coverage-changed-files: 0

  # ── iOS ───────────────────────────────────────────────────
  build-ios:
    runs-on: macos-14
    needs: [detekt, secrets-scan, crash-check]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6

      - name: Cache Kotlin/Native compiler
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Build iOS framework
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64

      - name: Run iOS tests
        # Advisory: the iOS sim TEST binary cannot link the native Firebase
        # frameworks in CI (FirebaseCore is provided to the Xcode app target via
        # CocoaPods, not to Gradle's standalone linkDebugTestIosSimulatorArm64).
        # The blocking iOS gate is the framework link step above; the crash-check
        # job covers crash patterns. Re-enable blocking once the test target can
        # link Firebase in CI (CocoaPods for the test executable).
        run: ./gradlew :composeApp:iosSimulatorArm64Test
        continue-on-error: true

      - name: Upload iOS test reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ios-test-reports
          path: composeApp/build/reports/tests/iosSimulatorArm64Test/
          retention-days: 14

  # ── Cloud Functions ───────────────────────────────────────
  functions-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
