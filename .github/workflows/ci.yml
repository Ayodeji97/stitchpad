name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Security ──────────────────────────────────────────────
  secrets-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for leaked secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Code Quality ──────────────────────────────────────────
  detekt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew detekt

  # ── Android ───────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    needs: [detekt, secrets-scan]
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6

      - name: Create google-services.json for CI
        run: |
          cat > composeApp/google-services.json << 'GSEOF'
          {
            "project_info": { "project_number": "000000000000", "project_id": "stitchpad-ci", "storage_bucket": "stitchpad-ci.appspot.com" },
            "client": [{ "client_info": { "mobilesdk_app_id": "1:000000000000:android:0000000000000000", "android_client_info": { "package_name": "com.danzucker.stitchpad" } }, "api_key": [{ "current_key": "CI_DUMMY_KEY" }] }],
            "configuration_version": "1"
          }
          GSEOF

      - name: Build Android debug APK
        run: ./gradlew :composeApp:assembleDebug

      - name: Run Android Lint
        run: ./gradlew :composeApp:lintDebug
        continue-on-error: true

      - name: Run tests
        run: ./gradlew :composeApp:allTests

      - name: Generate coverage report
        run: ./gradlew :composeApp:koverXmlReport :composeApp:koverHtmlReport
        if: always()

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: composeApp/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: composeApp/build/reports/tests/
          retention-days: 14

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: composeApp/build/reports/kover/
          retention-days: 14

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: composeApp/build/reports/lint-results-debug.html
          retention-days: 14

      - name: Test results summary
        uses: dorny/test-reporter@v1
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        with:
          name: Unit Tests
          path: composeApp/build/test-results/**/TEST-*.xml
          reporter: java-junit

      - name: Coverage PR comment
        uses: mi-kas/kover-report@v1
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        with:
          path: composeApp/build/reports/kover/report.xml
          title: Code Coverage
          update-comment: true
          min-coverage-overall: 0
          min-coverage-changed-files: 0

  # ── iOS ───────────────────────────────────────────────────
  build-ios:
    runs-on: macos-14
    needs: [detekt, secrets-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6

      - name: Cache Kotlin/Native compiler
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Build iOS framework
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64

      - name: Run iOS tests
        run: ./gradlew :composeApp:iosSimulatorArm64Test
        continue-on-error: true

      - name: Upload iOS test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-test-reports
          path: composeApp/build/reports/tests/iosSimulatorArm64Test/
          retention-days: 14
