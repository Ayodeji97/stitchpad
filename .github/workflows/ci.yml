name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detekt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew detekt

  build-android:
    runs-on: ubuntu-latest
    needs: detekt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Create google-services.json for CI
        run: |
          cat > composeApp/google-services.json << 'GSEOF'
          {
            "project_info": { "project_number": "000000000000", "project_id": "stitchpad-ci", "storage_bucket": "stitchpad-ci.appspot.com" },
            "client": [{ "client_info": { "mobilesdk_app_id": "1:000000000000:android:0000000000000000", "android_client_info": { "package_name": "com.danzucker.stitchpad" } }, "api_key": [{ "current_key": "CI_DUMMY_KEY" }] }],
            "configuration_version": "1"
          }
          GSEOF
      - run: ./gradlew :composeApp:assembleDebug
      - run: ./gradlew :composeApp:allTests

  build-ios:
    runs-on: macos-14
    needs: detekt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64
