<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StitchPad — Referral Admin</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <span class="logo-link"><img src="/logo.svg" alt="">Referral Admin</span>
  </header>

  <main class="admin">
    <!-- Sign-in -->
    <section id="loginView" hidden>
      <h1>Referral Admin</h1>
      <p class="admin-note">Admin sign-in required. Only accounts with the admin role can load payout data.</p>
      <form id="loginForm" class="admin-form" autocomplete="on">
        <input id="email" type="email" placeholder="Admin email" autocomplete="username" required>
        <input id="password" type="password" placeholder="Password" autocomplete="current-password" required>
        <button class="cta" type="submit" id="loginBtn">Sign in</button>
      </form>
      <p class="admin-error" id="loginError"></p>
    </section>

    <!-- Dashboard -->
    <section id="dashView" hidden>
      <div class="admin-bar">
        <div>
          <h1>Referral payouts</h1>
          <p class="admin-note" id="asOf"></p>
        </div>
        <div class="admin-actions">
          <button class="cta secondary" id="csvBtn">Download payout CSV</button>
          <button class="cta secondary" id="signOutBtn">Sign out</button>
        </div>
      </div>

      <div class="admin-totals" id="totals"></div>

      <div class="admin-table-wrap">
        <table class="admin-table" id="marketersTable">
          <thead>
            <tr>
              <th>Marketer</th><th>Code</th><th>Status</th>
              <th class="num">Installs</th><th class="num">Activated</th><th class="num">Qualified</th>
              <th class="num">Pending ₦</th><th class="num">Confirmed ₦</th><th class="num">Paid ₦</th>
              <th>Bank</th>
            </tr>
          </thead>
          <tbody id="marketersBody"></tbody>
        </table>
      </div>
      <p class="admin-error" id="dashError"></p>
    </section>

    <p class="admin-loading" id="loading">Loading…</p>
  </main>

  <!-- Firebase (compat) from the same gstatic CDN the fonts use. -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>
  <script>
    // ── Firebase web config ────────────────────────────────────────────────────
    // OPS PREREQUISITE: register a Web App for project stitchpad-30607 in the
    // Firebase console (Project settings → Your apps → Web) and paste its apiKey +
    // appId below. projectId/authDomain/bucket are already correct. The Android key
    // in google-services.json is NOT the web key — register a proper Web App.
    var firebaseConfig = {
      apiKey: 'PASTE_WEB_API_KEY',
      authDomain: 'stitchpad-30607.firebaseapp.com',
      projectId: 'stitchpad-30607',
      storageBucket: 'stitchpad-30607.firebasestorage.app',
      appId: 'PASTE_WEB_APP_ID',
    };

    var CONFIGURED = firebaseConfig.apiKey.indexOf('PASTE_') !== 0;

    var el = function (id) { return document.getElementById(id); };
    var show = function (id, on) { el(id).hidden = !on; };
    var naira = function (kobo) { return '₦' + (Math.round(kobo) / 100).toLocaleString('en-NG', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); };

    var loaded = null; // last dashboard payload, for CSV

    if (!CONFIGURED) {
      show('loading', false);
      show('loginView', true);
      el('loginError').textContent = 'Not configured: paste the Firebase web apiKey/appId into admin.html (see the OPS PREREQUISITE comment).';
      el('loginBtn').disabled = true;
    } else {
      firebase.initializeApp(firebaseConfig);
      var auth = firebase.auth();
      var fns = firebase.app().functions('europe-west1');

      auth.onAuthStateChanged(function (user) {
        if (user) { loadDashboard(); }
        else { show('loading', false); show('dashView', false); show('loginView', true); }
      });

      el('loginForm').addEventListener('submit', function (e) {
        e.preventDefault();
        el('loginError').textContent = '';
        el('loginBtn').disabled = true;
        auth.signInWithEmailAndPassword(el('email').value.trim(), el('password').value)
          .catch(function (err) {
            el('loginError').textContent = 'Sign-in failed: ' + (err && err.message ? err.message : 'unknown error');
          })
          .finally(function () { el('loginBtn').disabled = false; });
      });

      el('signOutBtn').addEventListener('click', function () { auth.signOut(); });
      el('csvBtn').addEventListener('click', downloadCsv);
    }

    function loadDashboard() {
      show('loginView', false);
      show('dashView', false);
      show('loading', true);
      el('dashError').textContent = '';
      fns.httpsCallable('getReferralDashboard')({})
        .then(function (res) { loaded = res.data; render(res.data); })
        .catch(function (err) {
          show('loading', false);
          var code = err && err.code ? err.code : '';
          if (code.indexOf('permission-denied') !== -1) {
            // Signed in, but not an admin — sign out and explain.
            el('loginError').textContent = 'This account is not an admin. Ask for the admin role, then sign in again.';
            show('loginView', true);
            firebase.auth().signOut();
          } else {
            show('dashView', true);
            el('dashError').textContent = 'Could not load data: ' + (err && err.message ? err.message : 'unknown error');
          }
        });
    }

    function render(data) {
      show('loading', false);
      show('dashView', true);
      el('asOf').textContent = 'As of ' + new Date(data.generatedAtMs).toLocaleString('en-NG');

      var t = data.totals;
      el('totals').innerHTML = [
        card('Marketers', t.marketers),
        card('Installs', t.installs),
        card('Activated', t.activated),
        card('Qualified', t.qualified),
        card('Pending', naira(t.pendingAmount)),
        card('Confirmed (to pay)', naira(t.confirmedAmount)),
        card('Paid', naira(t.paidAmount)),
      ].join('');

      var rows = data.marketers.map(function (m) {
        var bank = m.bankName ? (esc(m.bankName) + ' · ' + esc(m.bankAccountName || '') + ' · ' + esc(m.bankAccountNumber || '')) : '—';
        return '<tr>' +
          td(esc(m.name) + '<br><span class="muted">' + esc(m.email) + '</span>') +
          td('<code>' + esc(m.code) + '</code>') +
          td('<span class="badge ' + (m.status === 'active' ? 'ok' : 'off') + '">' + esc(m.status) + '</span>') +
          num(m.installs) + num(m.activated) + num(m.qualified) +
          num(naira(m.pendingAmount)) + num('<strong>' + naira(m.confirmedAmount) + '</strong>') + num(naira(m.paidAmount)) +
          td('<span class="muted">' + bank + '</span>') +
          '</tr>';
      }).join('');
      el('marketersBody').innerHTML = rows || '<tr><td colspan="10" class="muted">No marketers yet.</td></tr>';
    }

    function card(label, value) { return '<div class="admin-card"><div class="admin-card-label">' + label + '</div><div class="admin-card-value">' + value + '</div></div>'; }
    function td(html) { return '<td>' + html + '</td>'; }
    function num(html) { return '<td class="num">' + html + '</td>'; }
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }

    // ── CSV (payout run) ───────────────────────────────────────────────────────
    function csvField(v) { var s = String(v == null ? '' : v); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; }
    function downloadCsv() {
      if (!loaded) return;
      var header = ['Marketer', 'Email', 'Phone', 'Code', 'Payout kind', 'Bank name', 'Account name', 'Account number', 'Pending (NGN)', 'Confirmed (NGN)', 'Paid (NGN)', 'Installs', 'Activated', 'Qualified', 'Status'];
      var lines = [header.join(',')];
      loaded.marketers.forEach(function (m) {
        lines.push([
          m.name, m.email, m.phone || '', m.code, m.payoutKind,
          m.bankName || '', m.bankAccountName || '', m.bankAccountNumber || '',
          (m.pendingAmount / 100).toFixed(2), (m.confirmedAmount / 100).toFixed(2), (m.paidAmount / 100).toFixed(2),
          m.installs, m.activated, m.qualified, m.status,
        ].map(csvField).join(','));
      });
      var blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'referral-payouts-' + new Date(loaded.generatedAtMs).toISOString().slice(0, 10) + '.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
