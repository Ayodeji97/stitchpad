<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join StitchPad</title>
  <meta name="description" content="You've been invited to StitchPad — the workshop companion for Nigerian tailors.">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="referral">
    <img src="/logo.svg" alt="StitchPad" class="brand-mark">
    <h1>You're invited to StitchPad</h1>
    <p class="subtitle">The workshop companion for Nigerian tailors.</p>

    <div class="code-card" id="codeCard" hidden>
      <p class="code-label">Your referral code</p>
      <div class="code-value" id="codeValue">—</div>
    </div>

    <a class="cta" id="primaryCta" href="#">Get the app</a>
    <a class="cta secondary" id="secondaryCta" href="#" hidden></a>
    <p class="copied" id="copied"></p>

    <p class="hint" id="hint">
      Install the app and sign up — your referral is applied automatically.
    </p>
  </main>

  <script>
    // ── Config ────────────────────────────────────────────────────────────────
    // Play URL format MUST match functions/src/referral/marketerAdmin.ts (playUrl).
    var CONFIG = {
      playPackage: 'com.danzucker.stitchpad',
      // TODO(Daniel): replace with the real numeric App Store ID from App Store
      // Connect. Until then the iOS button falls back to an App Store search.
      appStoreId: null,
      appStoreName: 'stitchpad',
    };

    // Clipboard provenance token written on iOS so the app can capture the referral
    // after install (deferred deep link). Format is a CONTRACT with the app's
    // clipboard reader: "stitchpad-ref:<CODE>:<unixMillis>". The distinctive prefix +
    // timestamp let the app reject a plain shared /r/ URL and stale copies — closing
    // the provenance gap. Kept off the visible code (which stays a clean, typable
    // string for the manual "Have a referral code?" field).
    var CLIPBOARD_PREFIX = 'stitchpad-ref:';

    // ── Code extraction ───────────────────────────────────────────────────────
    // Path is /r/<code>; also accept ?ref= / ?code= for flexibility. Normalize to
    // the server's charset (uppercase, strip spaces/hyphens, [0-9A-Z]{1,32}).
    function extractCode() {
      var parts = window.location.pathname.split('/').filter(Boolean); // ["r","CODE"]
      var raw = parts.length > 1 ? parts[1] : null;
      if (!raw) {
        var q = new URLSearchParams(window.location.search);
        raw = q.get('ref') || q.get('code');
      }
      if (!raw) return null;
      var decoded;
      try {
        decoded = decodeURIComponent(raw);
      } catch (e) {
        // Malformed percent-encoding (e.g. /r/50%off) — decodeURIComponent throws.
        // Fall back to the raw value; it'll fail the charset check below anyway.
        decoded = raw;
      }
      var cleaned = decoded.replace(/[\s-]/g, '').toUpperCase();
      return /^[0-9A-Z]{1,32}$/.test(cleaned) ? cleaned : null;
    }

    function detectPlatform() {
      var ua = navigator.userAgent || '';
      if (/android/i.test(ua)) return 'android';
      if (/iphone|ipad|ipod/i.test(ua)) return 'ios';
      // iPadOS 13+ reports as Mac with touch.
      if (/macintosh/i.test(ua) && navigator.maxTouchPoints > 1) return 'ios';
      return 'other';
    }

    function playUrl(code) {
      return 'https://play.google.com/store/apps/details?id=' + CONFIG.playPackage +
        '&referrer=' + encodeURIComponent('ref=' + code);
    }

    function appStoreUrl() {
      return CONFIG.appStoreId
        ? 'https://apps.apple.com/app/id' + CONFIG.appStoreId
        : 'https://apps.apple.com/search?term=' + encodeURIComponent(CONFIG.appStoreName);
    }

    // ── Render ────────────────────────────────────────────────────────────────
    (function () {
      var code = extractCode();
      var platform = detectPlatform();
      var primary = document.getElementById('primaryCta');
      var secondary = document.getElementById('secondaryCta');
      var copied = document.getElementById('copied');
      var hint = document.getElementById('hint');

      if (code) {
        document.getElementById('codeValue').textContent = code;
        document.getElementById('codeCard').hidden = false;
      }

      if (platform === 'android' && code) {
        // Play Install Referrer is the real attributing signal — send the user
        // straight to the listing carrying referrer=ref%3DCODE.
        var url = playUrl(code);
        primary.textContent = 'Continue to Google Play';
        primary.href = url;
        window.location.replace(url); // auto-redirect; button is the fallback.
        return;
      }

      if (platform === 'ios') {
        // Safari requires a user gesture to write the clipboard, so do it on tap,
        // then send the user to the App Store. The app reads the token on first launch.
        primary.textContent = code ? 'Copy code & open App Store' : 'Open the App Store';
        primary.href = appStoreUrl();
        primary.addEventListener('click', function (e) {
          if (code && navigator.clipboard) {
            e.preventDefault();
            var token = CLIPBOARD_PREFIX + code + ':' + Date.now();
            navigator.clipboard.writeText(token).then(finish, finish);
            function finish() {
              copied.textContent = 'Code copied — opening the App Store…';
              window.location.href = appStoreUrl();
            }
          }
          // No clipboard API (old Safari / in-app webview): fall through to the
          // anchor's href — the visible code + manual field is the reliable path.
        });
        // Lead with manual entry so attribution never silently depends on the
        // clipboard write landing.
        if (code) {
          hint.textContent = 'After installing, open the app, sign up, and enter code ' +
            code + ' when asked.';
        }
        return;
      }

      // Desktop / other — show both stores; the user installs on their phone.
      primary.textContent = 'Get it on Google Play';
      primary.href = code ? playUrl(code) : 'https://play.google.com/store/apps/details?id=' + CONFIG.playPackage;
      secondary.textContent = 'Download on the App Store';
      secondary.href = appStoreUrl();
      secondary.hidden = false;
      hint.textContent = code
        ? 'Install StitchPad on your phone, sign up, and enter code ' + code + ' if asked.'
        : hint.textContent;
    })();
  </script>
</body>
</html>
